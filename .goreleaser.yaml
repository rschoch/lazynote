# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2
project_name: lazynote

builds:
  - id: lazynote
    main: ./cmd/lazynote
    binary: lazynote
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }} -X main.commit={{ .Commit }} -X main.date={{ .Date }} -X main.builtBy=goreleaser
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: lazynote
    ids:
      - lazynote
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
      {{- if .Arm }}v{{ .Arm }}{{ end -}}
      {{- if not (eq .Amd64 "v1") }}{{ .Amd64 }}{{ end -}}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

nfpms:
  - id: linux-packages
    package_name: lazynote
    ids:
      - lazynote
    file_name_template: "{{ .ConventionalFileName }}"
    vendor: rschoch
    homepage: https://github.com/rschoch/lazynote
    maintainer: rschoch <rschoch.dev@gmail.com>
    description: Small terminal notes app built with gocui.
    section: utils
    priority: optional
    bindir: /usr/bin
    formats:
      - deb
      - rpm
      - apk
    contents:
      - src: README.md
        dst: /usr/share/doc/lazynote/README.md
        type: doc

checksum:
  name_template: checksums.txt

release:
  github:
    owner: rschoch
    name: lazynote

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
